services:
  api:
    build:
      context: ./apps/api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://deploysage:deploysage@db:5432/deploysage
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    depends_on:
      - db

  dev:
    build:
      context: ./apps/api
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://deploysage:deploysage@db:5432/deploysage
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: deploysage
      POSTGRES_PASSWORD: deploysage
      POSTGRES_DB: deploysage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
